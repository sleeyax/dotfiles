source = ~/.config/hypr/conf/keybindings/default.conf

# unbind default Sidepad keys
unbind = $mainMod, S
unbind = $mainMod SHIFT, S

# move Sidepad from S to P
bind = $mainMod, P, exec, ~/.config/ml4w/scripts/sidepad.sh --init                        # Init Sidepad
bind = $mainMod SHIFT, P, exec, ~/.config/ml4w/scripts/sidepad.sh --select                # Select Sidepad

# flameshot screenshot
bind = $mainMod, S, exec, QT_SCALE_FACTOR=0.8335 flameshot gui
bind = $mainMod SHIFT, S, exec, QT_SCALE_FACTOR=0.8335 flameshot gui

# -----------------------------------------------------
# hyprscrolling
# -----------------------------------------------------

# scroll-aware focus across columns (wraps + centers view)
bind = $mainMod, comma, layoutmsg, focus l
bind = $mainMod, period, layoutmsg, focus r

# move active window / column left-right in the row
bind = $mainMod SHIFT, comma, layoutmsg, movewindowto l
bind = $mainMod SHIFT, period, layoutmsg, movewindowto r

# jump to beginning / end of row
bind = $mainMod, Home, layoutmsg, fit tobeg
bind = $mainMod, End, layoutmsg, fit toend

# cycle column width through explicit_column_widths
bind = $mainMod, minus, layoutmsg, colresize -conf
bind = $mainMod, equal, layoutmsg, colresize +conf

# fit modes
bind = $mainMod ALT, F, layoutmsg, togglefit
bind = $mainMod ALT, V, layoutmsg, fit visible
bind = $mainMod ALT, C, layoutmsg, fit active

# promote window into its own column
bind = $mainMod ALT, O, layoutmsg, promote

# swap column with neighbor
bind = $mainMod ALT, comma, layoutmsg, swapcol l
bind = $mainMod ALT, period, layoutmsg, swapcol r
